<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Authenticity Detector</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="light-mode">
    <nav class="navbar">
        <div class="container nav-container">
            <a href="/" class="logo">
                <i class="ph ph-shield-check"></i>
                <span>AuthDetect AI</span>
            </a>
            <ul class="nav-links">
                <li><a href="/" class="{% if active_page == 'home' %}active{% endif %}">Home</a></li>
                <li><a href="/detect" class="{% if active_page == 'detect' %}active{% endif %}">Detect</a></li>
                <li><a href="/about" class="{% if active_page == 'about' %}active{% endif %}">About</a></li>
            </ul>
            <div class="nav-actions">
                <button id="theme-toggle" class="icon-btn" aria-label="Toggle Dark Mode">
                    <i class="ph ph-moon"></i>
                </button>
                <div class="mobile-menu-btn">
                    <i class="ph ph-list"></i>
                </div>
            </div>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <div class="container footer-container">
            <p>&copy; 2024 AuthDetect AI. All rights reserved.</p>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
